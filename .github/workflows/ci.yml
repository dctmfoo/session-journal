name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: bats-core/bats-action@3.0.1
      - name: Install shellcheck on macOS
        if: runner.os == 'macOS'
        run: brew install shellcheck
      - name: Validate shell syntax
        run: |
          bash -n hooks/session-journal-pointer.sh
          bash -n hooks/session-journal-nudge.sh
          bash -n extras/spine-promotion/journal-spine-promotion-nudge.sh
          bash -n install.sh
      - name: Run shellcheck
        run: shellcheck hooks/*.sh extras/spine-promotion/*.sh install.sh
      - name: Run bats suites
        run: bats tests
      - name: Check tracked journals with the runtime secrets guard
        run: printf '%s' '{"stop_hook_active":false}' | JOURNAL_FRESH_SECS=999999999 hooks/session-journal-nudge.sh

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks 8.24.3
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            --output /tmp/gitleaks.tar.gz
          echo '9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c  /tmp/gitleaks.tar.gz' | sha256sum --check
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
      - name: Scan the full repository history
        run: /tmp/gitleaks detect --source . --log-opts="--all" --redact --no-banner
